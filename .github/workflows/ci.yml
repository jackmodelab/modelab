name: CI

# Security + quality gates (F-9 / T-9): lint, type-check, and a dependency
# audit run on every PR and on pushes to main. The audit fails the build on any
# high-severity (or worse) advisory, so a vulnerable dependency can't merge
# unnoticed. Keep Next >= 16.2.6 (already pinned via the ^16.2.7 range).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm audit --audit-level=high
